pipeline:
  name: rlhf-pipeline
  version: 1.0.0
  models:
    flash: gemini-3.5-flash
    pro: gemini-3.5-flash
  thresholds:
    kappa_minimum: 0.65
    confidence_minimum: 0.75
    adversarial_flag: 0.40
  routing:
    domains: [code, legal, medical, math, general]
    expert_domains: [legal, medical]
    max_batch_size: 500
  storage:
    gcs_bucket: your-rlhf-bucket
    bigquery_dataset: rlhf_pipeline
    output_path: gs://your-rlhf-bucket/outputs/
  export:
    format: jsonl
    include_provenance: true
    include_confidence: true
